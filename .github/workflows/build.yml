# =============================================================================
# GitHub Actions Workflow for Kaggle for ML Engineers
# Builds documentation, runs tests, and creates releases
# =============================================================================

name: Build and Deploy

# =============================================================================
# Triggers
# =============================================================================
on:
  # Trigger on push to main branch
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  
  # Trigger on pull requests
  pull_request:
    branches:
      - main
      - master
  
  # Trigger on version tags
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      deploy_docs:
        description: 'Deploy documentation to GitHub Pages'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      create_release:
        description: 'Create GitHub release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# =============================================================================
# Environment Variables
# =============================================================================
env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.6.0'

# =============================================================================
# Jobs
# =============================================================================
jobs:
  # ===========================================================================
  # Code Quality & Linting
  # ===========================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy isort bandit
      
      - name: Check code formatting with Black
        run: black --check --diff --line-length 100 src/ tests/
        continue-on-error: true
      
      - name: Check import sorting with isort
        run: isort --check-only --diff src/ tests/
        continue-on-error: true
      
      - name: Lint with flake8
        run: flake8 src/ tests/ --max-line-length=100 --statistics
        continue-on-error: true
      
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true
      
      - name: Security check with bandit
        run: bandit -r src/ -f json -o bandit-report.json || true
      
      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ===========================================================================
  # Run Tests
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist
          pip install -r requirements.txt
      
      - name: Run tests with pytest
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            -n auto
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
            .pytest_cache/
          retention-days: 30

  # ===========================================================================
  # Build Documentation
  # ===========================================================================
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name != 'pull_request' || github.event.inputs.deploy_docs == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git-revision-date plugin
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-docs-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-docs-
      
      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material
          pip install mkdocs-minify-plugin
          pip install mkdocstrings[python]
          pip install pymdown-extensions
      
      - name: Build MkDocs site
        run: mkdocs build --strict --verbose
      
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-site
          path: site/
          retention-days: 30

  # ===========================================================================
  # Deploy Documentation to GitHub Pages
  # ===========================================================================
  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.ref == 'refs/heads/main' || github.event.inputs.deploy_docs == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    
    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation-site
          path: site/
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ===========================================================================
  # Build PDF Documentation
  # ===========================================================================
  build-pdf:
    name: Build PDF
    runs-on: ubuntu-latest
    needs: build-docs
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install pandoc and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended
          sudo apt-get install -y texlive-latex-extra texlive-lang-english
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Python dependencies for PDF generation
        run: |
          python -m pip install --upgrade pip
          pip install pypandoc weasyprint markdown
      
      - name: Combine markdown files
        run: |
          cat docs/index.md > combined.md
          echo -e "\n\n---\n\n" >> combined.md
          cat docs/01-strategy-production.md >> combined.md
          echo -e "\n\n---\n\n" >> combined.md
          cat docs/02-cv-architecture.md >> combined.md
          echo -e "\n\n---\n\n" >> combined.md
          cat docs/03-feature-engineering.md >> combined.md
          echo -e "\n\n---\n\n" >> combined.md
          cat docs/04-model-playbooks.md >> combined.md
          echo -e "\n\n---\n\n" >> combined.md
          cat docs/05-ensembling-systems.md >> combined.md
          echo -e "\n\n---\n\n" >> combined.md
          cat docs/06-advanced-tactics.md >> combined.md
          echo -e "\n\n---\n\n" >> combined.md
          cat docs/07-production-reality.md >> combined.md
          echo -e "\n\n---\n\n" >> combined.md
          cat docs/08-career-strategy-and-90-day-plan.md >> combined.md
      
      - name: Generate PDF with pandoc
        run: |
          pandoc combined.md \
            -o kaggle-for-ml-engineers.pdf \
            --pdf-engine=xelatex \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            -V documentclass=report \
            --toc \
            --toc-depth=2 \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=blue \
            -V toccolor=black \
            --highlight-style=tango \
            -V author="Amer Hussein" \
            -V title="Kaggle for ML Engineers" \
            -V subtitle="Competitive Systems & Applied Architecture"
      
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-documentation
          path: kaggle-for-ml-engineers.pdf
          retention-days: 90

  # ===========================================================================
  # Create GitHub Release
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-docs, build-pdf]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation-site
          path: site/
      
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: pdf-documentation
          path: ./
      
      - name: Create documentation archive
        run: |
          tar -czvf kaggle-for-ml-engineers-docs.tar.gz site/
          zip -r kaggle-for-ml-engineers-docs.zip site/
      
      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          ## Kaggle for ML Engineers - ${{ steps.get_version.outputs.VERSION }}
          
          ### What's Included
          
          - **PDF Documentation**: Complete book in PDF format
          - **HTML Documentation**: Browseable documentation site
          - **Source Code**: Full Python framework implementation
          
          ### Installation
          
          ```bash
          pip install -r requirements.txt
          ```
          
          ### Quick Start
          
          ```python
          from src.models.oof_pipeline import OOFManager
          from src.ensembling.stacking import StackingClassifier
          ```
          
          ### Documentation
          
          Visit https://amerhussein.github.io/kaggle-for-ml-engineers/ for full documentation.
          
          ### License
          
          This work is licensed under CC BY 4.0.
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          files: |
            kaggle-for-ml-engineers.pdf
            kaggle-for-ml-engineers-docs.tar.gz
            kaggle-for-ml-engineers-docs.zip
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Security Scan
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install safety
        run: pip install safety
      
      - name: Run safety check
        run: safety check -r requirements.txt --full-report || true
      
      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: python
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  # ===========================================================================
  # Notify on Completion
  # ===========================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint, test, deploy-docs, release]
    if: always()
    
    steps:
      - name: Notify on success
        if: needs.lint.result == 'success' && needs.test.result == 'success' && needs.deploy-docs.result == 'success'
        run: |
          echo "Build completed successfully!"
          echo "Documentation deployed to: https://amerhussein.github.io/kaggle-for-ml-engineers/"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "Build failed! Check the logs for details."
